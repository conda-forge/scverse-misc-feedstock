schema_version: 1

context:
  version: "0.1.1"
  python_min: "3.12"

package:
  name: scverse-misc
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/scverse-misc/scverse_misc-${{ version }}.tar.gz
  sha256: 5001572763a88d962f7e40309d1e47a62ae3c358aec93e377af998e4c7e6dd97

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatch-vcs
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - session-info2
    - typing_extensions
# once repodata v3 hits:
# extras:
#  datasets:
#    - anndata
#    - pooch
#    - pyyaml
#    - tqdm
#  settings:
#    - pydantic-settings
#    - python-dotenv
#  spatialdata:
#    - spatialdata
#  sphinx:
#    - pydocstring-rs >=0.1.13
#    - sphinx >=9

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - scverse_misc
      pip_check: true

about:
  summary: Miscellaneous utility code used by scverse packages
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/scverse/scverse-misc
  repository: https://github.com/scverse/scverse-misc
  documentation: https://scverse-misc.readthedocs.io/

extra:
  recipe-maintainers:
    - ilia-kats
    - flying-sheep
    - ilan-gold
    - grst
